name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'cafe-zeitlos-website/package-lock.json'

      - name: Install Dependencies
        working-directory: ./cafe-zeitlos-website
        run: npm ci

      - name: Lint
        working-directory: ./cafe-zeitlos-website
        run: npm run lint

      - name: Run Tests
        working-directory: ./cafe-zeitlos-website
        run: npm run test -- --passWithNoTests

      - name: Download Demo Images
        working-directory: ./cafe-zeitlos-website
        run: node scripts/download-demo-images.mjs

      - name: Validate Images
        working-directory: ./cafe-zeitlos-website
        run: npm run validate:images

      - name: Build
        working-directory: ./cafe-zeitlos-website
        run: npm run build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './cafe-zeitlos-website/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
